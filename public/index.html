<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Interactive Map for Deekwoken" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Deepwoken Interactive Map</title>

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-24RZPJXWGM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-24RZPJXWGM");
    </script>

    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.5.0/build/ol.js"></script>
  </head>
  <body>
    <noscript>Please enable your Javascript use this Website.</noscript>
    <div id="root">
      <script>
        var map = new ol.Map({
          target: "map",
          layers: [
            new ol.layer.Tile({
              source: new ol.source.OSM(),
            }),
          ],
          view: new ol.View({
            center: ol.proj.fromLonLat([37.41, 8.82]),
            zoom: 4,
          }),
        });
      </script>
    </div>
  </body>
</html>
